# Your Laptop
# │
# ├── localhost:8888  →  jupyter container
# │                        │
# │                        │  SparkSession connects via spark-net
# │                        ▼
# ├── localhost:8080  →  spark-master (tracks workers, receives jobs)
# │                        │
# │                        │  registers on spark-net
# │                        ▼
# ├── localhost:8081  →  spark-worker (executes tasks, holds executors)
# │
# ├── localhost:4040  →  App UI from spark-master
# └── localhost:4041  →  App UI from jupyter's driver process

services:
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"   # Worker registration port
      - "8080:8080"   # Spark Master Web UI
      - "4040:4040"   # Spark Application UI (jobs/stages/tasks)
    environment:
      - SPARK_MASTER_HOST=spark-master    # hostname the master binds to
      - SPARK_MASTER_PORT=7077            # port workers connect on
      - SPARK_MASTER_WEBUI_PORT=8080      # port for the web dashboard
      - SPARK_PUBLIC_DNS=localhost        # what hostname links in the UI use
    volumes:
      - ./app:/opt/spark-app      # your .py scripts → inside container
      - ./data:/opt/spark-data    # your CSVs/parquets → inside container
    networks:
      - spark-net

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081"   # Worker Web UI
    environment:
      - SPARK_WORKER_CORES=2     # how many CPU cores this worker offers
      - SPARK_WORKER_MEMORY=2G   # how much RAM this worker offers
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_PUBLIC_DNS=localhost
    volumes:
      - ./app:/opt/spark-app    # same app folder mounted here too
      - ./data:/opt/spark-data  # same data folder mounted here too
    networks:
      - spark-net

  # jupyter:
